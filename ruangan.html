<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruangan - Sarpras</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800">

    <div class="md:ml-64 pt-16 min-h-screen">
        <main class="p-6">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold text-slate-800">Data Ruangan</h1>
                <button onclick="openModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg flex items-center gap-2">
                    <i class="fas fa-plus"></i> Tambah Ruangan
                </button>
            </div>

            <!-- Tabel Data -->
            <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-slate-100 text-slate-600 uppercase text-xs font-semibold">
                            <tr>
                                <th class="p-4">Foto</th>
                                <th class="p-4">Kode</th>
                                <th class="p-4">Nama Ruangan</th>
                                <th class="p-4">Jenis</th>
                                <th class="p-4">PJ Ruangan</th>
                                <th class="p-4 text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="ruanganTable" class="text-sm divide-y divide-slate-100">
                            <tr><td colspan="6" class="p-4 text-center">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Form -->
    <div id="modalForm" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl w-full max-w-lg overflow-hidden">
            <div class="p-4 border-b flex justify-between items-center bg-slate-50">
                <h3 class="font-bold text-lg">Kelola Ruangan</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-red-500"><i class="fas fa-times"></i></button>
            </div>
            <form id="formRuangan" class="p-4 space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">Kode Ruangan</label>
                        <input type="text" id="kode" class="w-full border p-2 rounded text-sm" placeholder="Contoh: R-001" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">Nama Ruangan</label>
                        <input type="text" id="nama" class="w-full border p-2 rounded text-sm" placeholder="Lab Komputer" required>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">Jenis</label>
                        <select id="jenis" class="w-full border p-2 rounded text-sm">
                            <option value="Kelas">Kelas</option>
                            <option value="Laboratorium">Laboratorium</option>
                            <option value="Kantor">Kantor</option>
                            <option value="Gudang">Gudang</option>
                            <option value="Lainnya">Lainnya</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">Penanggung Jawab</label>
                        <input type="text" id="pj" class="w-full border p-2 rounded text-sm" placeholder="Nama Guru/Staff">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1">Link Foto (Opsional)</label>
                    <input type="url" id="photoUrl" placeholder="https://i.ibb.co/..." class="w-full border p-2 rounded text-sm">
                </div>

                <div class="pt-4 border-t flex justify-end gap-2">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded">Batal</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white hover:bg-blue-700 rounded">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        checkAuth();
        initLayout();

        const user = JSON.parse(localStorage.getItem('sarpras_user'));

        async function loadData() {
            const tbody = document.getElementById('ruanganTable');
            tbody.innerHTML = '<tr><td colspan="6" class="p-4 text-center">Loading...</td></tr>';

            // Fetch data dari tabel 'ruangan'
            const { data, error } = await sb
                .from('ruangan')
                .select('*')
                .eq('school_id', user.school_id)
                .order('kode', { ascending: true });

            if (error) {
                tbody.innerHTML = `<tr><td colspan="6" class="p-4 text-center text-red-500">${error.message}</td></tr>`;
                return;
            }

            if (!data.length) {
                tbody.innerHTML = `<tr><td colspan="6" class="p-4 text-center text-slate-400">Belum ada data ruangan.</td></tr>`;
                return;
            }

            tbody.innerHTML = data.map(item => {
                const photoUrl = (item.photos && item.photos.length > 0) ? item.photos[0].url : 'https://via.placeholder.com/50?text=Room';
                return `
                    <tr class="hover:bg-slate-50 transition border-b border-slate-100">
                        <td class="p-4">
                            <img src="${photoUrl}" class="w-10 h-10 object-cover rounded bg-slate-200" alt="Foto">
                        </td>
                        <td class="p-4 font-bold text-slate-700">${item.kode}</td>
                        <td class="p-4 font-medium">${item.nama}</td>
                        <td class="p-4 text-slate-600">${item.jenis}</td>
                        <td class="p-4 text-slate-600">${item.penanggung_jawab || '-'}</td>
                        <td class="p-4 text-center">
                            <button onclick="deleteRoom('${item.id}')" class="text-red-500 hover:text-red-700 bg-red-50 p-2 rounded-lg"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        document.getElementById('formRuangan').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const payload = {
                school_id: user.school_id,
                kode: document.getElementById('kode').value,
                nama: document.getElementById('nama').value,
                jenis: document.getElementById('jenis').value,
                penanggung_jawab: document.getElementById('pj').value,
                photos: document.getElementById('photoUrl').value ? [{ url: document.getElementById('photoUrl').value }] : []
            };

            const { error } = await sb.from('ruangan').insert([payload]);

            if (!error) {
                closeModal();
                loadData();
            } else {
                alert('Gagal menyimpan: ' + error.message);
            }
        });

        async function deleteRoom(id) {
            if(!confirm('Hapus ruangan ini? Data inventaris di dalamnya mungkin akan kehilangan referensi ruangan.')) return;
            const { error } = await sb.from('ruangan').delete().eq('id', id);
            if (!error) loadData();
            else alert(error.message);
        }

        function openModal() { document.getElementById('modalForm').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modalForm').classList.add('hidden'); document.getElementById('formRuangan').reset(); }

        loadData();
    </script>
	<!-- Letakkan sebelum penutup body -->
	<script src="js/notification-service.js"></script>
</body>
</html>
