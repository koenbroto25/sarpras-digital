<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventaris KIB - Sarpras</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800">

    <div class="md:ml-64 pt-16 min-h-screen">
        <main class="p-6">
            <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                <div>
                    <h1 class="text-2xl font-bold text-slate-800">Inventaris Barang (KIB)</h1>
                    <p class="text-sm text-slate-500">Sesuai standar administrasi sekolah & audit.</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="openModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg flex items-center gap-2">
                        <i class="fas fa-plus"></i> Tambah Aset
                    </button>
                </div>
            </div>

            <!-- Tabel Data -->
            <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-slate-200">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-slate-100 text-slate-700 uppercase text-xs font-bold">
                            <tr>
                                <th class="p-4">Kode/QR</th>
                                <th class="p-4">Nama & Spesifikasi</th>
                                <th class="p-4">Kategori</th>
                                <th class="p-4">Sumber Dana</th>
                                <th class="p-4">Tahun</th>
                                <th class="p-4">Kondisi</th>
                                <th class="p-4 text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryTable" class="text-sm divide-y divide-slate-100">
                            <tr><td colspan="7" class="p-4 text-center">Loading data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Form (Expanded for KIB) -->
    <div id="modalForm" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4 overflow-y-auto">
        <div class="bg-white rounded-xl w-full max-w-2xl overflow-hidden my-8">
            <div class="p-4 border-b flex justify-between items-center bg-slate-50">
                <h3 class="font-bold text-lg">Input Kartu Inventaris Barang (KIB)</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-red-500"><i class="fas fa-times"></i></button>
            </div>
            <form id="formInventaris" class="p-6 space-y-4">
                <input type="hidden" id="itemId">
                
                <!-- Section 1: Identitas -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">Nama Barang *</label>
                        <input type="text" id="itemName" class="w-full border p-2 rounded text-sm focus:ring-2 focus:ring-blue-500" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">Kode Barang (KIB) *</label>
                        <input type="text" id="itemCode" class="w-full border p-2 rounded text-sm" placeholder="Auto/Manual" required>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">Merk / Tipe</label>
                        <input type="text" id="itemMerk" class="w-full border p-2 rounded text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">Kategori</label>
                        <select id="itemCategory" class="w-full border p-2 rounded text-sm bg-white">
                            <option value="Perabotan">Perabotan (Meja/Kursi)</option>
                            <option value="Elektronik">Elektronik</option>
                            <option value="Alat Laboratorium">Alat Laboratorium</option>
                            <option value="Buku">Buku / Perpustakaan</option>
                            <option value="Kendaraan">Kendaraan</option>
                        </select>
                    </div>
                </div>

                <!-- Section 2: Keuangan (Penting untuk Dokumen Hal 29) -->
                <div class="bg-blue-50 p-4 rounded-lg border border-blue-100">
                    <h4 class="text-xs font-bold text-blue-800 mb-3 uppercase">Data Perolehan & Aset</h4>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-1">Tahun Perolehan</label>
                            <input type="number" id="itemYear" class="w-full border p-2 rounded text-sm" placeholder="2024">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-1">Sumber Dana</label>
                            <select id="itemFund" class="w-full border p-2 rounded text-sm bg-white">
                                <option value="BOS">BOS</option>
                                <option value="Yayasan">Yayasan</option>
                                <option value="Hibah">Hibah</option>
                                <option value="Komite">Komite</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-1">Harga Perolehan (Rp)</label>
                            <input type="number" id="itemPrice" class="w-full border p-2 rounded text-sm" placeholder="0">
                        </div>
                    </div>
                </div>

                <!-- Section 3: Kondisi & Lokasi -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">Kondisi</label>
                        <select id="itemCondition" class="w-full border p-2 rounded text-sm bg-white">
                            <option value="Baik">Baik</option>
                            <option value="Rusak Ringan">Rusak Ringan</option>
                            <option value="Rusak Berat">Rusak Berat</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">Lokasi Ruangan</label>
                        <!-- Akan diisi via JS -->
                        <select id="itemRoom" class="w-full border p-2 rounded text-sm bg-white"></select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">Jumlah</label>
                        <input type="number" id="itemQty" class="w-full border p-2 rounded text-sm" value="1">
                    </div>
                </div>

                 <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1">Link Foto (Link External)</label>
                    <input type="url" id="itemPhotoUrl" class="w-full border p-2 rounded text-sm">
                </div>

                <div class="pt-4 border-t flex justify-end gap-2">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded">Batal</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white hover:bg-blue-700 rounded shadow-md">Simpan Data KIB</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal QR Code (Hal 20) -->
    <div id="modalQR" class="fixed inset-0 bg-black bg-opacity-60 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl w-full max-w-sm overflow-hidden text-center p-6">
            <h3 class="font-bold text-lg mb-2">QR Code Inventaris</h3>
            <p class="text-sm text-slate-500 mb-4" id="qrItemName">Loading...</p>
            
            <div id="qrcode" class="flex justify-center mb-4 border-2 border-slate-100 p-4 rounded-lg inline-block"></div>
            
            <p class="text-xs text-slate-400 mb-4">Scan untuk melihat detail barang & histori.</p>
            
            <div class="flex gap-2 justify-center">
                <button onclick="document.getElementById('modalQR').classList.add('hidden')" class="px-4 py-2 border rounded-lg hover:bg-slate-50">Tutup</button>
                <button onclick="printQR()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700"><i class="fas fa-print"></i> Cetak</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        checkAuth();
        initLayout();

        const user = JSON.parse(localStorage.getItem('sarpras_user'));

        async function loadData() {
            const tbody = document.getElementById('inventoryTable');
            tbody.innerHTML = '<tr><td colspan="7" class="p-4 text-center">Loading...</td></tr>';

            const { data, error } = await sb
                .from('inventaris')
                .select('*, ruangan(nama)')
                .eq('school_id', user.school_id)
                .order('created_at', { ascending: false });

            if (error) return alert(error.message);

            // Load Opsi Ruangan untuk Modal
            const roomRes = await sb.from('ruangan').select('id, nama').eq('school_id', user.school_id);
            const roomSelect = document.getElementById('itemRoom');
            roomSelect.innerHTML = roomRes.data.map(r => `<option value="${r.id}">${r.nama}</option>`).join('');

            tbody.innerHTML = data.map(item => {
                let badgeColor = '';
                // Sesuai Dokumen Hal 13 (Status & Badge)
                if (item.kondisi === 'Baik') badgeColor = 'bg-green-100 text-green-700 border border-green-200';
                else if (item.kondisi === 'Rusak Ringan') badgeColor = 'bg-yellow-100 text-yellow-700 border border-yellow-200';
                else badgeColor = 'bg-red-100 text-red-700 border border-red-200';

                return `
                    <tr class="hover:bg-slate-50 transition border-b border-slate-100">
                        <td class="p-4">
                            <div class="font-bold text-slate-700">${item.kode}</div>
                            <button onclick="showQR('${item.id}', '${item.kode}', '${item.nama}')" class="text-xs text-blue-600 hover:underline"><i class="fas fa-qrcode"></i> Lihat QR</button>
                        </td>
                        <td class="p-4">
                            <div class="font-bold">${item.nama}</div>
                            <div class="text-xs text-slate-500">${item.merk || '-'}</div>
                        </td>
                        <td class="p-4 text-slate-600">${item.kategori || '-'}</td>
                        <td class="p-4 text-slate-600">
                            <span class="text-xs bg-slate-100 px-2 py-1 rounded border">${item.sumber_dana || '-'}</span>
                        </td>
                        <td class="p-4 text-slate-600">${item.tahun_pembelian || '-'}</td>
                        <td class="p-4">
                            <span class="px-2 py-1 rounded text-xs font-bold ${badgeColor}">${item.kondisi}</span>
                        </td>
                        <td class="p-4 text-center">
                            <button onclick="deleteItem('${item.id}', '${item.nama}')" class="text-red-500 hover:bg-red-50 p-2 rounded"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // Logic Simpan Data dengan Audit Trail
        document.getElementById('formInventaris').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const payload = {
                school_id: user.school_id,
                nama: document.getElementById('itemName').value,
                kode: document.getElementById('itemCode').value,
                merk: document.getElementById('itemMerk').value,
                kategori: document.getElementById('itemCategory').value,
                tahun_pembelian: document.getElementById('itemYear').value || null,
                sumber_dana: document.getElementById('itemFund').value,
                harga: document.getElementById('itemPrice').value || 0,
                kondisi: document.getElementById('itemCondition').value,
                ruangan_id: document.getElementById('itemRoom').value,
                jumlah: document.getElementById('itemQty').value,
                photos: document.getElementById('itemPhotoUrl').value ? [{url: document.getElementById('itemPhotoUrl').value}] : []
            };

            // 1. Insert Barang
            const { data, error } = await sb.from('inventaris').insert([payload]).select();

            if (!error && data) {
                // 2. Insert Log (Audit Trail) - Sesuai Hal 9
                const logPayload = {
                    school_id: user.school_id,
                    inventaris_id: data[0].id,
                    user_id: user.id,
                    user_name: user.name,
                    jenis_aktivitas: 'Tambah Barang',
                    keterangan: `Menambahkan ${payload.nama} via Admin Panel`,
                    kondisi_awal: '-',
                    kondisi_akhir: payload.kondisi
                };
                await sb.from('riwayat_barang').insert([logPayload]);

                closeModal();
                loadData();
                alert('Data KIB Berhasil Disimpan!');
            } else {
                alert('Gagal: ' + error.message);
            }
        });

        // Tampilkan QR Code
        function showQR(id, code, name) {
            document.getElementById('modalQR').classList.remove('hidden');
            document.getElementById('qrItemName').innerText = name + ' (' + code + ')';
            
            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = '';
            
            // Format QR: URL ke detail barang (Contoh simulasi)
            // Sesuai hal 20: Link detail barang tanpa data sensitif
            const qrData = `${window.location.origin}/detail.html?id=${id}`; 
            
            new QRCode(qrContainer, {
                text: qrData,
                width: 128,
                height: 128
            });
        }

        function printQR() {
            const printContent = document.getElementById('qrcode').innerHTML;
            const win = window.open('', '', 'width=600,height=600');
            win.document.write(`<html><body style="text-align:center; margin-top:50px;"><h2>${document.getElementById('qrItemName').innerText}</h2>${printContent}</body></html>`);
            win.document.close();
            win.print();
        }

        async function deleteItem(id, nama) {
            if(!confirm(`Hapus ${nama}? Data akan hilang dari daftar KIB.`)) return;
            const { error } = await sb.from('inventaris').delete().eq('id', id);
            if (!error) loadData();
        }

        function openModal() { document.getElementById('modalForm').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modalForm').classList.add('hidden'); document.getElementById('formInventaris').reset(); }

        loadData();
    </script>
</body>
</html>
